name = "talmudpedia-artifact-dispatch"
main = "src/index.ts"
compatibility_date = "2026-03-11"
workers_dev = true

[[dispatch_namespaces]]
binding = "DISPATCHER_PRODUCTION"
namespace = "talmudpedia-artifacts-production"

  [dispatch_namespaces.outbound]
  service = "talmudpedia-artifact-outbound"
  parameters = ["artifact_outbound_grant", "artifact_allowed_hosts"]

[[dispatch_namespaces]]
binding = "DISPATCHER_STAGING"
namespace = "talmudpedia-artifacts-staging"

  [dispatch_namespaces.outbound]
  service = "talmudpedia-artifact-outbound"
  parameters = ["artifact_outbound_grant", "artifact_allowed_hosts"]

[vars]
BACKEND_SHARED_SECRET = ""
